# questions-schema.yaml
# Defines the SQLite table shape for logged questions.
# Loaded by questions.mjs on first run to CREATE TABLE IF NOT EXISTS.
# Edit and re-initialize to change the table shape.

table: questions
description: "Tracks questions logged by subagents that require user answers before a stage can proceed"
columns:
  - name: id
    type: INTEGER
    primary_key: true
    autoincrement: true
  - name: stage
    type: TEXT
    not_null: true
  - name: group_name
    type: TEXT
  - name: question
    type: TEXT
    not_null: true
  - name: proposed
    type: TEXT
  - name: required
    type: INTEGER
    not_null: true
    default: 1
  - name: status
    type: TEXT
    not_null: true
    default: "pending"
  - name: answer
    type: TEXT
  - name: created_at
    type: TEXT
    not_null: true
  - name: answered_at
    type: TEXT
