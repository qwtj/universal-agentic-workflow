# requirements-schema.yaml
# Defines the SQLite table shape for requirements records.
# Loaded by requirements.mjs on first run to CREATE TABLE IF NOT EXISTS.
# Edit and re-initialize (delete the .db file) to change the table shape.

table: requirements
description: "Tracks functional, non-functional, data, acceptance criteria, and risk requirements"
columns:
  - name: id
    type: INTEGER
    primary_key: true
    autoincrement: true
  - name: role
    type: TEXT
    not_null: true
  - name: number
    type: TEXT
    not_null: true
  - name: type
    type: TEXT
    not_null: true
    default: "functional"
  - name: title
    type: TEXT
    not_null: true
  - name: description
    type: TEXT
  - name: priority
    type: TEXT
    not_null: true
    default: "must"
  - name: status
    type: TEXT
    not_null: true
    default: "draft"
  - name: source
    type: TEXT
  - name: stage
    type: TEXT
  - name: created_at
    type: TEXT
    not_null: true
  - name: updated_at
    type: TEXT
    not_null: true
