# discovery-schema.yaml
# Defines the SQLite table shape for workspace discoveries.
# Loaded by discoveries.mjs on first run to CREATE TABLE IF NOT EXISTS.
# Edit and re-initialize (delete the .db file) to change the table shape.

table: discoveries
description: "Tracks workspace discoveries: gaps, unknowns, patterns, and recommendations"
columns:
  - name: id
    type: INTEGER
    primary_key: true
    autoincrement: true
  - name: role
    type: TEXT
    not_null: true
  - name: stage
    type: TEXT
  - name: category
    type: TEXT
    not_null: true
    default: "gap"
  - name: title
    type: TEXT
    not_null: true
  - name: description
    type: TEXT
  - name: evidence
    type: TEXT
  - name: impact
    type: TEXT
    not_null: true
    default: "medium"
  - name: status
    type: TEXT
    not_null: true
    default: "open"
  - name: created_at
    type: TEXT
    not_null: true
  - name: updated_at
    type: TEXT
    not_null: true
